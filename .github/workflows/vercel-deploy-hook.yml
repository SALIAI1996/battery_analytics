# Triggers a Vercel production deployment via Deploy Hook (GitHub → curl → Vercel).
# Add repo secret VERCEL_DEPLOY_HOOK_URL = full URL from Vercel → Project → Settings → Git → Deploy Hooks.
# Do not commit the real URL to the repository.

name: Trigger Vercel deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  vercel:
    runs-on: ubuntu-latest
    steps:
      - name: POST deploy hook
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "Skip: VERCEL_DEPLOY_HOOK_URL is not set in repo Secrets."
            exit 0
          fi
          curl -fsS -X POST "$HOOK_URL" -H "Content-Type: application/json"
