# Render Blueprint — import this repo and deploy the Python API.
# Dashboard: New → Blueprint → Connect repo → select this file (or paste contents).

services:
  - type: web
    name: environmental-analytics-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      # Comma-separated browser origins allowed to call the API (Vercel preview + production).
      # Example: https://your-app.vercel.app,https://your-app-git-main-yourname.vercel.app
      - key: CORS_ORIGINS
        sync: false
      # Optional: ThingSpeak read key so POST body can omit the key (server-side only).
      - key: THINGSPEAK_READ_API_KEY
        sync: false
